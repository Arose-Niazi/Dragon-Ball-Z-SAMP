# Reference production compose for the Dragon Ball Z open.mp server.
#
# The live server on Hetzner is driven by the infra repo
# (my-server-infra/samp/dragon-ball-z/docker-compose.yaml, host networking).
# This file mirrors that setup for local prod-style testing on Windows/Mac,
# where host networking is unavailable so a UDP port mapping is used instead.
services:
  samp-server:
    # Production: pull the pre-built image from GHCR (built by GitHub Actions).
    image: ghcr.io/arose-niazi/dragon-ball-z-samp:latest
    # Local development: build from the Dockerfile instead (comment out `image`).
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: dragon-ball-z-server
    restart: unless-stopped
    ports:
      - "7778:7778/udp"
    volumes:
      # Persist logs and saves
      - ./logs:/samp/logs
      - ./saves:/samp/saves
      # Gamemode .amx (+ filterscripts) mounted so updates need only a git pull + restart
      - ./gamemodes:/samp/gamemodes:ro
      - ./filterscripts:/samp/filterscripts:ro
      # Server-only secret overrides (never in the image/repo):
      #   real rcon + port 7778 in config.json, real DB creds in dbz_db.cfg
      - ./runtime/config.json:/samp/config.json:ro
      - ./runtime/dbz_db.cfg:/samp/scriptfiles/dbz_db.cfg:ro
    healthcheck:
      test: ["CMD", "pgrep", "omp-server"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: dragon-ball-z-net
