name: Build & Push server image (GHCR)

# Builds the open.mp server image and pushes it to the GitHub Container
# Registry. The gamemode `.amx` is NOT baked in (it is volume-mounted on the
# server), so this only needs to rebuild when the runtime/binaries/config change.
#
# The image contains no secrets: config.json ships a placeholder rcon password
# and the real config.json + dbz_db.cfg are volume-mounted on the server. The
# package can therefore safely be public, letting the server pull with no login.

on:
  workflow_dispatch: {}
  push:
    branches: [openmp]
    paths:
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "omp-server"
      - "log-core.so"
      - "log-core2.so"
      - "plugins/**"
      - "components/**"
      - "models/**"
      - "scriptfiles/**"
      - "config.json"
      - "bans.json"
      - ".dockerignore"
      - ".github/workflows/docker-build-push.yml"

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/arose-niazi/dragon-ball-z-samp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
